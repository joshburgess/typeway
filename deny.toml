# Configuration for cargo-deny
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

# Advisory database: deny known-vulnerable crates
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# License checks
[licenses]
unlicensed = "deny"
copyleft = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Ban duplicate versions of key crates (warn only: duplicates are common
# in the Tower ecosystem during major-version transitions)
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Sources: only allow crates from crates.io and local paths
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
