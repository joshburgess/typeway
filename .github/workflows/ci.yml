name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run tests (default features)
        run: cargo test --workspace

      - name: Run tests (all features)
        run: cargo test --workspace --all-features

      - name: Run tests (no default features)
        run: cargo test -p typeway --no-default-features
        # Verify the core compiles without server/client/openapi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-Dwarnings"

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.80"
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --workspace --all-features

  audit:
    name: Dependency Audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check advisories and licenses
        run: cargo deny check advisories licenses

  security:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  benchmarks:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Restore criterion baseline saved from a previous main-branch run.
      - name: Restore benchmark baseline
        id: bench-cache
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ runner.os }}-main
          restore-keys: |
            criterion-baseline-${{ runner.os }}-

      # On main: run benchmarks and save as the new baseline.
      - name: Run benchmarks (main - save baseline)
        if: github.ref == 'refs/heads/main'
        run: |
          cargo bench --bench routing --bench dispatch --features "server,axum-interop" \
            -- --save-baseline main 2>&1 | tee bench-output.txt

      # On PRs: compare against the cached main baseline.
      - name: Run benchmarks (PR - compare against baseline)
        if: github.event_name == 'pull_request'
        run: |
          if [ -d target/criterion ]; then
            cargo bench --bench routing --bench dispatch --features "server,axum-interop" \
              -- --baseline main 2>&1 | tee bench-output.txt
          else
            echo "No cached baseline found — running without comparison."
            cargo bench --bench routing --bench dispatch --features "server,axum-interop" \
              2>&1 | tee bench-output.txt
          fi

      # Fail the job if any benchmark regressed by more than 15%.
      # Criterion output lines look like:
      #   ... time: ... change: [-3.1234% +1.2345% +5.6789%] (p = 0.01 < 0.05)
      #   Performance has regressed.
      # We extract the middle (point estimate) percentage from "change:" lines
      # and fail if any exceeds +15%.
      - name: Check for regressions (>15% threshold)
        if: github.event_name == 'pull_request'
        run: |
          THRESHOLD=15
          FAILED=0

          # Extract point-estimate change percentages from criterion output.
          # The middle value in the [low est high] bracket is the point estimate.
          while IFS= read -r line; do
            # Parse the point estimate (second percentage in the bracket)
            pct=$(echo "$line" | sed -n 's/.*change: \[.*% \([-+]*[0-9.]*\)% .*/\1/p')
            if [ -z "$pct" ]; then
              continue
            fi
            # Check if the regression exceeds the threshold (using awk for float comparison)
            is_regression=$(echo "$pct $THRESHOLD" | awk '{print ($1 > $2) ? 1 : 0}')
            if [ "$is_regression" = "1" ]; then
              echo "::error::Regression of ${pct}% exceeds ${THRESHOLD}% threshold: $line"
              FAILED=1
            fi
          done < bench-output.txt

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "=============================================="
            echo "  BENCHMARK REGRESSION DETECTED (>${THRESHOLD}% threshold)"
            echo "=============================================="
            exit 1
          fi
          echo "No benchmark regressions exceeding ${THRESHOLD}% detected."

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: bench-output.txt
          retention-days: 30

  compile-time:
    name: Compile Time
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Release build with timings
        run: cargo build --workspace --all-features --release --timings

      - name: Upload release timing report
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timing-release
          path: target/cargo-timings/cargo-timing.html

      - name: Clean before dev build
        run: cargo clean

      - name: Dev build with timings
        run: cargo build --workspace --all-features --timings 2>&1 | tee build-timing.txt

      - name: Upload dev timing output
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timing-dev
          path: |
            build-timing.txt
            target/cargo-timings/cargo-timing.html
